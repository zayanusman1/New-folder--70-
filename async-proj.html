<!DOCTYPE html>
<html lang="en">

<body>
    <h2>Js Async/await</h2>
    <h1 id="result"></h1>
    <script>
        async function product(a, b) {
            let response = await a * b;
            display(response);
        }
        function display(data) {
            document.getElementById("result").innerHTML = data;
        }
        product(4, 10);
    </script>
</body>

</html>
