<!DOCTYPE html>
<html lang="en">

<body>
    <h2>JS promise</h2>
    <p id="demo"></p>
    <script>
        function myDisplayer(some) {
            document.getElementById("demo").innerHTML = some;
        }
        function sum(a, b) {
            var sum = a + b;
            myDisplayer(sum);
        }
        let myPromise = new Promise(function (Myresolve, Myreject) {
            let x = 0;
            if (x == 0) {
                Myresolve("OK");
            } else {
                Myreject("Error:");
            }
        });
        myPromise.then(
            function (value) { sum(5, 20); },
            function (error) { sum(error); }
        );
    </script>
</body>

</html>
